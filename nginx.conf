server {
    listen 80;
    server_name intellidocs.duckdns.org;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name intellidocs.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/intellidocs.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intellidocs.duckdns.org/privkey.pem;

    # Performance and security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase client body size for PDF uploads
        client_max_body_size 50M;
    }
}
